name: Monitorar fontes da base jurídica

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitorar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      # O STF entrega a cadeia TLS incompleta (repete a folha em vez de mandar o
      # intermediário). Fornecer o intermediário completa uma cadeia legítima —
      # não afrouxa a verificação. Detalhes em ferramentas/manutencao/certs/LEIA-ME.md.
      # As fontes do STF são coletadas de rede aceita (ver exclusão abaixo), mas o
      # passo fica: mantém o runner apto a falar TLS com o STF e o eco abaixo diz
      # se o portal passou a enviar a cadeia completa.
      - name: Confiar no intermediário que o STF não envia
        run: |
          sudo cp ferramentas/manutencao/certs/stf-globalsign-alphassl-r6-2025.crt \
            /usr/local/share/ca-certificates/
          sudo update-ca-certificates
          echo "Conferindo a cadeia do STF:"
          echo | openssl s_client -connect portal.stf.jus.br:443 \
            -servername portal.stf.jus.br 2>/dev/null | grep "Verify return code" || true

      # Seis famílias ficam de fora daqui: os portais do STF e o SCON do STJ
      # respondem 403 a requisição vinda de IP de datacenter, enquanto a mesma
      # coleta, com o mesmo cliente, responde 200 de uma rede aceita. Elas são
      # verificadas por monitorar-fontes-restritas.sh. Sem esta exclusão o 403
      # permanente abriria issue toda semana mesmo sem novidade. O relatório
      # declara o que ficou de fora.
      - name: Verificar sinais de mudança nas fontes oficiais
        env:
          EXCLUIR: sumulas_stj,jurisprudencia_teses_stj,sumulas_stf,sumulas_vinculantes,temas_rg_stf,informativo_stf
        run: |
          python3 ferramentas/manutencao/atualizar_base_juridica.py monitorar \
            --excluir "$EXCLUIR" > monitoramento.txt
          python3 ferramentas/manutencao/atualizar_base_juridica.py monitorar \
            --excluir "$EXCLUIR" --json > monitoramento.json
          cat monitoramento.txt

      - name: Abrir ou atualizar a issue de monitoramento
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mudancas=$(python3 -c "import json; print(json.load(open('monitoramento.json'))['mudancas'])")
          erros=$(python3 -c "import json; print(json.load(open('monitoramento.json'))['erros'])")
          if [ "$mudancas" = "0" ] && [ "$erros" = "0" ]; then
            echo "Nenhum sinal de mudança; nenhuma issue necessária."
            exit 0
          fi
          titulo="Monitoramento da base jurídica: sinais de mudança nas fontes"
          corpo_arquivo=corpo-issue.md
          {
            echo "O monitoramento agendado encontrou **${mudancas} sinal(is) de mudança** e ${erros} erro(s)."
            echo
            echo '```'
            cat monitoramento.txt
            echo '```'
            echo
            echo "O sinal indica que vale preparar um candidato; a decisão de promover continua humana."
            echo "Procedimento completo em \`base-juridica/ATUALIZACAO.md\`."
          } > "$corpo_arquivo"
          numero=$(gh issue list --state open --search "\"$titulo\" in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$numero" ]; then
            gh issue comment "$numero" --body-file "$corpo_arquivo"
          else
            gh issue create --title "$titulo" --body-file "$corpo_arquivo"
          fi
